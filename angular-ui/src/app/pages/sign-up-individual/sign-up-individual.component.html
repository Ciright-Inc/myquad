<div class="mx-auto flex min-h-screen max-w-lg flex-col justify-center px-4 py-10">
  <a routerLink="/sign-up" class="mb-6 text-sm font-semibold text-[#0c34da] hover:underline">← Account types</a>
  <div class="mq-panel p-8">
    <h1 class="text-2xl font-semibold text-[#060a32]">Individual workspace</h1>
    <p class="mt-2 text-sm text-black/60">Set up your personal task board and start planning immediately.</p>
    @if (error) {
      <p class="mt-4 rounded-lg bg-[#fe0f26]/10 px-3 py-2 text-sm text-[#fe0f26]">{{ error }}</p>
    }
    <form class="mt-6 space-y-4" (ngSubmit)="submit()">
      <label class="flex flex-col gap-1 text-xs font-semibold uppercase tracking-wide text-[#2c4f66]">
        Full name
        <input required class="rounded-lg border border-black/10 px-3 py-2.5 text-sm normal-case" [(ngModel)]="name" name="name" />
      </label>
      <label class="flex flex-col gap-1 text-xs font-semibold uppercase tracking-wide text-[#2c4f66]">
        Email
        <input type="email" required class="rounded-lg border border-black/10 px-3 py-2.5 text-sm normal-case" [(ngModel)]="email" name="email" />
      </label>
      <label class="flex flex-col gap-1 text-xs font-semibold uppercase tracking-wide text-[#2c4f66]">
        Mobile (optional)
        <input class="rounded-lg border border-black/10 px-3 py-2.5 text-sm normal-case" [(ngModel)]="phone" name="phone" />
      </label>
      <label class="flex flex-col gap-1 text-xs font-semibold uppercase tracking-wide text-[#2c4f66]">
        Password
        <input type="password" required minlength="8" class="rounded-lg border border-black/10 px-3 py-2.5 text-sm normal-case" [(ngModel)]="password" name="pw" />
      </label>
      <button type="submit" class="w-full rounded-lg bg-[#2c4f66] py-3 text-sm font-semibold text-white shadow-lg shadow-[#2c4f66]/20 hover:bg-[#24465c]" [disabled]="busy">
        Create workspace
      </button>
    </form>
  </div>
</div>
